version: 2

models:
  - name: stg_patients
    description: "Staged patient data from FHIR JSON"
    columns:
      - name: patient_id
        description: "Primary key for patient"
        tests:
          - not_null
          - unique
      - name: gender
        description: "Biological gender"
        tests:
          - accepted_values:
              values: ['male', 'female', 'other', 'unknown']

  - name: stg_claims
    description: "Staged hospital claims data"
    columns:
      - name: facility_id
        description: "Primary key for hospital facility"
        tests:
          - not_null
