name: Healthcare Pipeline CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Create Mock Data for dbt
        run: |
          mkdir -p data/silver/patients/year=2024/month=1
          mkdir -p data/silver/hospital_claims/year=2024/month=1
          mkdir -p data/silver/clinical_trials/
          mkdir -p data/gold
          touch data/silver/patients/year=2024/month=1/dummy.parquet
          touch data/silver/hospital_claims/year=2024/month=1/dummy.parquet
          touch data/silver/clinical_trials/dummy.parquet

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyspark delta-spark pytest pytest-spark dbt-duckdb duckdb pandas pyyaml

      - name: Run PySpark Unit Tests
        run: |
          pytest tests/test_transformations.py tests/test_pipeline.py

      - name: Run dbt Tests
        run: |
          cd dbt_healthcare
          dbt debug --profiles-dir .
          dbt run --profiles-dir .
          dbt test --profiles-dir .
