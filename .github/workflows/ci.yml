name: Healthcare Pipeline CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Ingest/Transform Mock Data with Spark
        run: |
          # Ensure directories exist
          mkdir -p data/bronze/claims/2026-03-29/
          mkdir -p data/bronze/patients/2026-03-29/
          mkdir -p data/bronze/trials/2026-03-29/
          
          # Use your existing Spark job to generate valid Silver Parquet files
          # Note: We might need to provide a minimal CSV/JSON if they aren't in the repo
          python spark_jobs/bronze_to_silver.py
          

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyspark delta-spark pytest pytest-spark dbt-duckdb duckdb pandas pyyaml

      - name: Run PySpark Unit Tests
        run: |
          pytest tests/test_transformations.py tests/test_pipeline.py

      - name: Run dbt Tests
        run: |
          cd dbt_healthcare
          dbt run --profiles-dir .
          dbt test --profiles-dir .
