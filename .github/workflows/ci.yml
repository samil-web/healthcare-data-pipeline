name: Healthcare Pipeline CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyspark delta-spark pytest pytest-spark dbt-duckdb duckdb pandas pyyaml

      - name: Run PySpark Unit Tests
        run: |
          pytest tests/test_transformations.py tests/test_pipeline.py

      - name: Run dbt Tests
        run: |
          cd dbt_healthcare
          dbt debug --profiles-dir .
          dbt run --profiles-dir .
          dbt test --profiles-dir .
